name: Work-Talk-Coach CI-CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Verify and Test the Python Backend
  backend-ci:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Automatically caches backend dependencies

    - name: Install Backend Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Backend Tests
      run: |
        # Run your test suite (pytest, unittest, etc.)
        # pytest
        echo "Backend tests passed successfully."

  # Job 2: Verify, Lint, and Build the React Frontend
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm' # Automatically caches node_modules

    - name: Install Frontend Dependencies
      run: npm ci

    - name: Check Code Linting & Formatting
      run: |
        # Adjust if you use a different script names in package.json
        npm run lint --if-present

    - name: Build Frontend Application
      run: npm run build

  # Job 3: Automated Deployment (Only triggers on pushes to main/master branches)
  deploy:
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Execute Deployment
      run: |
        echo "Both frontend and backend checks passed!"
        echo "Deploying the updated application..."
        # Insert your hosting provider's CLI deployment commands here (e.g., AWS, Vercel, Heroku, Docker)
